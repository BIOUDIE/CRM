<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI-powered CRM with smart capture, icebreaker generation, and referral tracking." />
  
  <!-- Material Symbols Outlined Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <!-- Plus Jakarta Sans Font -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  
  <title>Micro-CRM - Client Relationship Manager</title>
  
  <!-- Firebase SDK - CRITICAL: Load before React app -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
    import { getAuth, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js';
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      getDocs,
      deleteDoc,
      collection,
      query,
      where,
      orderBy
    } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDAGh6d-ANtRYCdFO-X_h2cYXxHmuflYjY",
        authDomain: "elektro-micro-crm-44df0.firebaseapp.com",
        projectId: "elektro-micro-crm-44df0",
        storageBucket: "elektro-micro-crm-44df0.firebasestorage.app",
        messagingSenderId: "800547908958",
        appId: "1:800547908958:web:33435ce327db23b79af3cf"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // CRITICAL: Expose to window IMMEDIATELY
    window.firebaseAuth = auth;
    window.firebaseDb = db;
    window.signOut = signOut;
    window.onAuthStateChanged = onAuthStateChanged;
    window.setDoc = setDoc;
    window.getDoc = getDoc;
    window.getDocs = getDocs;
    window.deleteDoc = deleteDoc;
    window.collection = collection;
    window.doc = doc;
    window.query = query;
    window.where = where;
    window.orderBy = orderBy;
    
    // Set flag that Firebase is ready
    window.firebaseReady = true;
    
    console.log('✅ Firebase initialized and exposed to window');
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
